<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <!-- interactive-widget=resizes-content: when the iOS keyboard opens, RESIZE the
       viewport instead of natively panning the whole webview upward. The pan is the
       source of the black bar below the nav: in the installed PWA iOS often leaves
       the webview panned up after the keyboard closes (native transform — invisible
       to scrollY/visualViewport, unfixable from JS), exposing the black UIKit window
       below. Supported since Safari 18.4; unknown keys are ignored elsewhere. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
  <meta name="color-scheme" content="dark" />
  <title>MacroFactor</title>

  <!-- iOS PWA / add-to-home-screen -->
  <meta name="theme-color" content="#1A1A1A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MacroFactor" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

  <!-- Fonts: Archivo + Archivo Expanded (MacroSans substitute) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Archivo+Expanded:wght@100..900&display=swap" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
