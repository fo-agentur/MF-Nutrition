<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box}
  .grid{display:flex;align-items:flex-end;gap:18px}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:84px;background:var(--mf-surface-3);border:1px solid var(--mf-hairline)}
  .name{font-size:12px;font-weight:600}
  .v{font-size:11px;color:var(--mf-fg-3)}
</style></head><body>
  <div class="grid">
    <div class="sw"><div class="box" style="height:84px;border-radius:10px"></div><div class="name">sm</div><div class="v">10px · chips</div></div>
    <div class="sw"><div class="box" style="height:84px;border-radius:16px"></div><div class="name">md</div><div class="v">16px · buttons</div></div>
    <div class="sw"><div class="box" style="height:84px;border-radius:22px"></div><div class="name">lg</div><div class="v">22px · cards</div></div>
    <div class="sw"><div class="box" style="height:84px;border-radius:28px"></div><div class="name">xl</div><div class="v">28px · sheets</div></div>
    <div class="sw"><div class="box" style="height:84px;width:84px;border-radius:999px"></div><div class="name">pill</div><div class="v">full · FAB</div></div>
  </div>
</body></html>
