<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:22px 26px;box-sizing:border-box}
  .card{background:var(--mf-surface-1);border-radius:18px;padding:4px 18px}
  .row{display:flex;align-items:center;gap:18px;padding:16px 0;border-bottom:1px solid var(--mf-hairline)}
  .row:last-child{border-bottom:0}
  .row .ic{width:26px;height:26px;flex:none;color:#fff}
  .row .ic svg{width:26px;height:26px}
  .row .t{flex:1;font-size:18px;font-weight:500}
  .row .ch{color:var(--mf-fg-3);width:20px;height:20px}
</style></head><body>
  <div class="card">
    <div class="row"><span class="ic"><i data-lucide="smile"></i></span><span class="t">Account</span><i data-lucide="chevron-right" class="ch"></i></div>
    <div class="row"><span class="ic"><i data-lucide="tag"></i></span><span class="t">Subscription</span><i data-lucide="chevron-right" class="ch"></i></div>
    <div class="row"><span class="ic"><i data-lucide="refresh-cw"></i></span><span class="t">Integrations</span><i data-lucide="chevron-right" class="ch"></i></div>
    <div class="row"><span class="ic"><i data-lucide="ruler"></i></span><span class="t">Units</span><i data-lucide="chevron-right" class="ch"></i></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
