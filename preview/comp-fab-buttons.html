<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box;display:flex;align-items:center;gap:30px}
  .fab{width:68px;height:68px;border-radius:50%;background:#fff;color:#000;display:flex;
       align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.45)}
  .fab svg{width:32px;height:32px}
  .circ{width:48px;height:48px;border-radius:50%;background:var(--mf-surface-3);color:#fff;
        display:flex;align-items:center;justify-content:center}
  .circ svg{width:22px;height:22px}
  .small{width:38px;height:38px;background:var(--mf-surface-3);border-radius:50%;color:#fff;
        display:flex;align-items:center;justify-content:center}
  .small svg{width:18px;height:18px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:9px}
  .n{font-size:12px;color:var(--mf-fg-2)}
</style></head><body>
  <div class="sw"><div class="fab"><i data-lucide="plus"></i></div><div class="n">FAB</div></div>
  <div class="sw"><div class="circ"><i data-lucide="search"></i></div><div class="n">circular 48</div></div>
  <div class="sw"><div class="circ"><i data-lucide="x"></i></div><div class="n">close</div></div>
  <div class="sw"><div class="small"><i data-lucide="plus"></i></div><div class="n">add 38</div></div>
  <div class="sw"><div class="small"><i data-lucide="pencil"></i></div><div class="n">edit</div></div>
  <div class="sw"><div class="small"><i data-lucide="chevron-down"></i></div><div class="n">collapse</div></div>
  <script>lucide.createIcons();</script>
</body></html>
