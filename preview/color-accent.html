<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:70px;border-radius:14px;border:1px solid var(--mf-hairline)}
  .name{font-size:13px;font-weight:600}
  .hex{font-size:11px;color:var(--mf-fg-3);font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">accent · white</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#9B7FE8"></div><div class="name">purple · weight</div><div class="hex">#9B7FE8</div></div>
    <div class="sw"><div class="chip" style="background:#2BA89F"></div><div class="name">teal · food icon</div><div class="hex">#2BA89F</div></div>
    <div class="sw"><div class="chip" style="background:#4A78F0"></div><div class="name">info · dot</div><div class="hex">#4A78F0</div></div>
  </div>
</body></html>
