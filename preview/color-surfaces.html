<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#18181a;color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:7px}
  .chip{height:64px;border-radius:12px;border:1px solid var(--mf-hairline)}
  .name{font-size:12px;font-weight:600}
  .hex{font-size:11px;color:var(--mf-fg-3);font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="name">bg</div><div class="hex">#000000</div></div>
    <div class="sw"><div class="chip" style="background:#0B0B0C"></div><div class="name">surface-0</div><div class="hex">#0B0B0C</div></div>
    <div class="sw"><div class="chip" style="background:#161618"></div><div class="name">surface-1</div><div class="hex">#161618</div></div>
    <div class="sw"><div class="chip" style="background:#1E1E20"></div><div class="name">surface-2</div><div class="hex">#1E1E20</div></div>
    <div class="sw"><div class="chip" style="background:#2A2A2D"></div><div class="name">surface-3</div><div class="hex">#2A2A2D</div></div>
    <div class="sw"><div class="chip" style="background:#38383C"></div><div class="name">surface-4</div><div class="hex">#38383C</div></div>
  </div>
</body></html>
