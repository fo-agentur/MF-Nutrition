<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:26px 28px;box-sizing:border-box;display:flex;gap:26px;align-items:center}
  .sw{display:flex;flex-direction:column;gap:10px;align-items:center}
  .card{width:150px;height:80px;background:var(--mf-surface-2);border-radius:18px}
  .sheet{box-shadow:0 -8px 40px rgba(0,0,0,.55)}
  .fab{width:64px;height:64px;border-radius:50%;background:#fff;color:#000;display:flex;
       align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 18px rgba(0,0,0,.45)}
  .n{font-size:12px;color:var(--mf-fg-2)}
  .grab{width:36px;height:4px;border-radius:2px;background:var(--mf-surface-4);margin:8px auto 0}
</style></head><body>
  <div class="sw"><div class="card"></div><div class="n">card · no shadow</div></div>
  <div class="sw"><div class="card sheet"><div class="grab"></div></div><div class="n">sheet · drag + soft shadow</div></div>
  <div class="sw"><div class="fab">+</div><div class="n">FAB · drop shadow</div></div>
</body></html>
