<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box;display:flex;align-items:flex-end;gap:16px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{width:30px;background:var(--mf-surface-4);border-radius:6px}
  .n{font-size:11px;color:var(--mf-fg-2);font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="sw"><div class="bar" style="height:4px"></div><div class="n">4</div></div>
  <div class="sw"><div class="bar" style="height:8px"></div><div class="n">8</div></div>
  <div class="sw"><div class="bar" style="height:12px"></div><div class="n">12</div></div>
  <div class="sw"><div class="bar" style="height:16px"></div><div class="n">16</div></div>
  <div class="sw"><div class="bar" style="height:20px"></div><div class="n">20</div></div>
  <div class="sw"><div class="bar" style="height:24px"></div><div class="n">24</div></div>
  <div class="sw"><div class="bar" style="height:32px"></div><div class="n">32</div></div>
  <div class="sw"><div class="bar" style="height:40px"></div><div class="n">40</div></div>
  <div style="margin-left:14px;color:var(--mf-fg-3);font-size:12px;letter-spacing:.05em;text-transform:uppercase">4&nbsp;pt base scale</div>
</body></html>
