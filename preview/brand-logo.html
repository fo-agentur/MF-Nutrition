<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box;display:flex;align-items:center;gap:22px}
  .av{width:72px;height:72px;border-radius:50%;background:#fff;color:#000;display:flex;
      align-items:center;justify-content:center;font-family:var(--mf-font-display);
      font-weight:800;font-size:28px;letter-spacing:-1px}
  .who{display:flex;flex-direction:column;gap:4px}
  .name{font-size:22px;font-weight:600}
  .sub{font-size:15px;color:var(--mf-fg-2)}
  .word{margin-left:auto;font-family:var(--mf-font-display);font-weight:800;
        text-transform:uppercase;font-size:30px;letter-spacing:.02em}
</style></head><body>
  <div class="av">FL</div>
  <div class="who"><span class="name">floriflei07</span><span class="sub">Member Since 6. Januar 2026</span></div>
  <div class="word">MF</div>
</body></html>
