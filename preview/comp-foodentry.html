<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:24px 26px;box-sizing:border-box}
  .entry{display:flex;align-items:center;gap:16px;background:var(--mf-surface-2);
         border-radius:18px;padding:16px 18px}
  .ico{width:34px;height:34px;color:var(--mf-teal);flex:none}
  .ico svg{width:34px;height:34px}
  .mid{flex:1;min-width:0}
  .name{font-size:18px;font-weight:600;margin-bottom:4px}
  .macros{font-size:15px;color:var(--mf-fg-2);font-variant-numeric:tabular-nums}
  .macros b{color:var(--mf-fg)}
  .edit{width:38px;height:38px;border-radius:50%;background:var(--mf-surface-4);
        display:flex;align-items:center;justify-content:center;flex:none}
  .edit svg{width:18px;height:18px;color:#fff}
</style></head><body>
  <div class="entry">
    <span class="ico"><i data-lucide="utensils"></i></span>
    <div class="mid">
      <div class="name">Knusper Müsli Schoko By Spar</div>
      <div class="macros"><b>447</b>🔥 &nbsp;<b>10</b>P &nbsp;<b>15</b>F &nbsp;<b>64</b>C &nbsp;•&nbsp; 100 g</div>
    </div>
    <span class="edit"><i data-lucide="pencil"></i></span>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
