<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:26px 28px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1}
  .hero{font-size:46px;font-weight:700}
  .of{color:var(--mf-fg-2);font-weight:400;font-size:22px}
  .macros{display:flex;gap:22px;font-size:22px;font-weight:600}
  .meta{color:var(--mf-fg-3);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
  .e{color:var(--mf-energy)} .p{color:var(--mf-protein)} .f{color:var(--mf-fat)} .c{color:var(--mf-carb)}
</style></head><body>
  <div class="num hero">3395 <span class="of">of 2505</span></div>
  <div class="num macros"><span><span class="e">447</span> 🔥</span><span class="p">10 P</span><span class="f">15 F</span><span class="c">64 C</span></div>
  <div class="meta">Tabular numerals · data never jitters · macro letters carry color</div>
</body></html>
