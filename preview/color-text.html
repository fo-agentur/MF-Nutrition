<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--mf-bg);color:var(--mf-fg);font-family:var(--mf-font-body);
       padding:26px 28px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;align-items:center;gap:18px}
  .dot{width:30px;height:30px;border-radius:50%;flex:none;border:1px solid var(--mf-hairline)}
  .name{font-size:17px;font-weight:500;width:150px}
  .hex{font-size:12px;color:var(--mf-fg-3);font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="row"><span class="dot" style="background:#FFFFFF"></span><span class="name" style="color:#FFFFFF">Primary</span><span class="hex">#FFFFFF</span></div>
  <div class="row"><span class="dot" style="background:#A6A6AC"></span><span class="name" style="color:#A6A6AC">Secondary</span><span class="hex">#A6A6AC</span></div>
  <div class="row"><span class="dot" style="background:#6E6E75"></span><span class="name" style="color:#6E6E75">Tertiary / disabled</span><span class="hex">#6E6E75</span></div>
</body></html>
